<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video de Capacitación</title>
    <style>
        /* Elimina los márgenes del navegador y bloquea las barras de desplazamiento */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Fondo negro profesional de cine */
        }

        /* Fuerza al iframe a ocupar el 100% exacto de la pantalla visual */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://drive.google.com/file/d/1SSxiyrA4XYIhETHtw0YNKJfaj-Z1nPGx/preview" 
        allow="autoplay; fullscreen" 
        allowfullscreen="true" 
        webkitallowfullscreen="true" 
        mozallowfullscreen="true">
    </iframe>

</body>
</html>
